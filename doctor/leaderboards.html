<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>جداول الدوري - لوحة الدكتورة</title>
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/admin.css">
</head>
<body>
  <div id="doctor-login-overlay" class="modal-overlay" style="display:none">
    <div class="modal-box" style="max-width:420px">
      <div class="modal-header"><h3>دخول لوحة الدكتورة / الباقة</h3></div>
      <div class="modal-body">
        <p class="text-muted mb-2">أدخل كود الدخول للمتابعة</p>
        <div class="form-group"><input id="doctor-code" type="password" placeholder="كود الدخول" autocomplete="off"></div>
        <div id="doctor-login-message" class="text-red text-sm mb-1"></div>
        <button id="doctor-login-btn" class="btn btn-primary btn-block">دخول</button>
      </div>
    </div>
  </div>

  <div id="doctor-app" class="admin-shell" style="display:none">
    <nav class="admin-sidebar">
      <div class="sidebar-header">
      <img src="/assets/img/league-logo.png" alt="logo" class="admin-logo-img" /><div class="brand">دوري المذاكراوية <span>جداول الدوري - لوحة الدكتورة</span></div></div>
      <div class="sidebar-nav" id="doctor-nav"></div>
    </nav>
    <main class="admin-main">
      <div class="admin-topbar"><h1>جداول الدوري - لوحة الدكتورة</h1></div>
      <div class="admin-content">
        <label class="badge badge-purple mb-2"><input type="checkbox" id="toggle-my-students"> طلابي فقط</label>
        <div class="grid-2"><div class="card"><div class="card-title">🏆 بطل الجولة</div><div id="dlb-general"></div></div><div class="card"><div class="card-title">🎯 هداف الدوري</div><div id="dlb-questions"></div></div><div class="card"><div class="card-title">⚙️ أبطال التركيز</div><div id="dlb-focus"></div></div><div class="card"><div class="card-title">🧱 المثابر</div><div id="dlb-persistent"></div></div><div class="card"><div class="card-title">📝 كويز 9</div><div id="dlb-quiz"></div></div></div>
      </div>
    </main>
  </div>

  <div id="toast-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/supabase.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script src="/assets/js/doctor-panel.js"></script>
  <script>document.addEventListener('DOMContentLoaded', initDoctorLeaderboards);</script>
</body>
</html>
