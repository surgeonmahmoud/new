<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تقارير طلابي - لوحة الدكتورة</title>
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/admin.css">
</head>
<body>
  <div id="doctor-login-overlay" class="modal-overlay" style="display:none">
    <div class="modal-box" style="max-width:420px">
      <div class="modal-header"><h3>دخول لوحة الدكتورة / الباقة</h3></div>
      <div class="modal-body">
        <p class="text-muted mb-2">أدخل كود الدخول للمتابعة</p>
        <div class="form-group"><input id="doctor-code" type="password" placeholder="كود الدخول" autocomplete="off"></div>
        <div id="doctor-login-message" class="text-red text-sm mb-1"></div>
        <button id="doctor-login-btn" class="btn btn-primary btn-block">دخول</button>
      </div>
    </div>
  </div>

  <div id="doctor-app" class="admin-shell" style="display:none">
    <nav class="admin-sidebar">
      <div class="sidebar-header">
      <img src="/assets/img/league-logo.png" alt="logo" class="admin-logo-img" /><div class="brand">دوري المذاكراوية <span>تقارير طلابي - لوحة الدكتورة</span></div></div>
      <div class="sidebar-nav" id="doctor-nav"></div>
    </nav>
    <main class="admin-main">
      <div class="admin-topbar"><h1>تقارير طلابي - لوحة الدكتورة</h1></div>
      <div class="admin-content">
        <div class="filter-bar"><div class="form-group"><label class="form-label">التاريخ</label><input type="date" id="filter-date"></div><div class="form-group"><label class="form-label">الطالب</label><select id="filter-student"><option value="">كل الطلاب</option></select></div><div class="form-group"><label class="form-label">المادة</label><input id="filter-subject"></div><div class="form-group"><label class="form-label">الحالة</label><select id="filter-status"><option value="">كل الحالات</option><option value="pending">معلق</option><option value="approved">مقبول</option><option value="rejected">مرفوض</option></select></div></div>
        <div class="table-wrap"><table><thead><tr><th>التاريخ</th><th>الطالب</th><th>المادة</th><th>النشاط</th><th>الكمية</th><th>الساعات</th><th>النقاط</th><th>الحالة</th><th>ملاحظة</th><th>إجراءات</th></tr></thead><tbody id="my-reports-body"></tbody></table></div>
        <div id="review-modal" class="modal-overlay hidden" style="display:none"><div class="modal-box"><div class="modal-header"><h3>مراجعة التقرير</h3><button data-close-modal="review-modal" class="btn btn-ghost">×</button></div><div class="modal-body"><input type="hidden" id="review-report-id"><input type="hidden" id="review-student-id"><div class="form-group"><label class="form-label">النقاط</label><input type="number" id="review-points"></div><div class="form-group"><label class="form-label">ملاحظة الدكتور</label><textarea id="review-note"></textarea></div><div class="flex gap-sm"><button id="approve-report-btn" class="btn btn-green">اعتماد</button><button id="reject-report-btn" class="btn btn-red">رفض</button><button id="save-report-review-btn" class="btn btn-primary">حفظ التعديل</button></div></div></div></div>
      </div>
    </main>
  </div>

  <div id="toast-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/supabase.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script src="/assets/js/doctor-panel.js"></script>
  <script>document.addEventListener('DOMContentLoaded', initDoctorReports);</script>
</body>
</html>
