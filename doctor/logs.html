<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logs - لوحة الدكتورة</title>
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/admin.css">
</head>
<body>
  <div id="doctor-login-overlay" class="modal-overlay" style="display:none">
    <div class="modal-box" style="max-width:420px">
      <div class="modal-header"><h3>دخول لوحة الدكتورة / الباقة</h3></div>
      <div class="modal-body">
        <p class="text-muted mb-2">أدخل كود الدخول للمتابعة</p>
        <div class="form-group"><input id="doctor-code" type="password" placeholder="كود الدخول" autocomplete="off"></div>
        <div id="doctor-login-message" class="text-red text-sm mb-1"></div>
        <button id="doctor-login-btn" class="btn btn-primary btn-block">دخول</button>
      </div>
    </div>
  </div>

  <div id="doctor-app" class="admin-shell" style="display:none">
    <nav class="admin-sidebar">
      <div class="sidebar-header">
      <img src="/assets/img/league-logo.png" alt="logo" class="admin-logo-img" /><div class="brand">دوري المذاكراوية <span>Logs - لوحة الدكتورة</span></div></div>
      <div class="sidebar-nav" id="doctor-nav"></div>
    </nav>
    <main class="admin-main">
      <div class="admin-topbar"><h1>Logs - لوحة الدكتورة</h1></div>
      <div class="admin-content">
        <div class="filter-bar"><div class="form-group"><label class="form-label">التاريخ</label><input type="date" id="filter-date"></div><div class="form-group"><label class="form-label">الطالب</label><select id="filter-student"><option value="">كل الطلاب</option></select></div><div class="form-group"><label class="form-label">نوع العملية</label><input id="filter-action"></div></div>
        <div class="table-wrap"><table><thead><tr><th>الوقت</th><th>المصدر</th><th>الفاعل</th><th>الدور</th><th>العملية</th><th>الطالب</th><th>قبل</th><th>بعد</th><th>ملاحظة</th></tr></thead><tbody id="logs-body"></tbody></table></div>
      </div>
    </main>
  </div>

  <div id="toast-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/supabase.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script src="/assets/js/doctor-panel.js"></script>
  <script>document.addEventListener('DOMContentLoaded', initDoctorLogs);</script>
</body>
</html>
