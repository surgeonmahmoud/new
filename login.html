  <div class="auth-wrap">
    <div class="auth-box">
      <img src="/assets/img/league-logo.png" alt="logo" class="auth-logo-img" />
      <div class="auth-title">⚽ دخول لاعب</div>
      <p class="auth-sub">أدخل بياناتك وابدأ رحلتك في الدوري</p>

      <div id="loginAlert" style="display:none"></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="loginPhone">رقم التليفون</label>
          <input id="loginPhone" class="form-input" type="tel" placeholder="01XXXXXXXXX" autocomplete="tel" />
        </div>
        <div class="form-group">
          <label for="loginPin">الـ PIN</label>
          <input id="loginPin" class="form-input" type="password" placeholder="••••" autocomplete="current-password" />
        </div>
        <button id="loginBtn" type="submit" class="btn btn-gold btn-full btn-lg">دخول</button>
      </form>

      <div class="auth-link">
        لا تملك حسابًا؟ <a href="/signup.html">إنشاء لاعب</a>
      </div>
      <div class="auth-link" style="margin-top:8px">
        <a href="/index.html">← الرجوع للرئيسية</a>
      </div>
    </div>
