<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>إنشاء لاعب — دوري المذاكراوية</title>
  <link rel="stylesheet" href="/assets/css/main.css" />
</head>
<body>
  <div class="auth-wrap" style="padding: 32px 24px;">
    <div class="auth-box" style="max-width:480px">
      <img src="/assets/img/league-logo.png" alt="logo" class="auth-logo-img" />
      <div class="auth-title">✨ إنشاء لاعب</div>
      <p class="auth-sub">سجل بياناتك وانضم للدوري</p>

      <div id="signupAlert" style="display:none"></div>

      <form id="signupForm" novalidate>
        <div class="form-group">
          <label for="sName">الاسم الكامل <span class="text-danger">*</span></label>
          <input id="sName" class="form-input" type="text" placeholder="اسمك هنا" />
        </div>
        <div class="form-group">
          <label for="sPhone">رقم التليفون <span class="text-danger">*</span></label>
          <input id="sPhone" class="form-input" type="tel" placeholder="01XXXXXXXXX" />
        </div>
        <div class="form-group">
          <label for="sGrade">الصف <span class="text-danger">*</span></label>
          <select id="sGrade" class="form-select">
            <option value="">اختر الصف</option>
            <option value="الثالث الثانوي">الثالث الثانوي</option>
            <option value="الثاني الثانوي">الثاني الثانوي</option>
            <option value="الأول الثانوي">الأول الثانوي</option>
          </select>
        </div>
        <div class="form-group">
          <label for="sEdu">النظام التعليمي <span class="text-danger">*</span></label>
          <select id="sEdu" class="form-select">
            <option value="">اختر</option>
            <option value="مصري">مصري</option>
            <option value="أزهري">أزهري</option>
            <option value="دولي">دولي</option>
          </select>
        </div>
        <div class="form-group" id="trackWrap">
          <label for="sTrack">الشعبة / التخصص</label>
          <select id="sTrack" class="form-select">
            <option value="">اختر (اختياري)</option>
            <option value="علمي علوم">علمي علوم</option>
            <option value="علمي رياضة">علمي رياضة</option>
            <option value="أدبي">أدبي</option>
          </select>
        </div>
        <div class="form-group">
          <label for="sDoctor">المجموعة / الدكتور</label>
          <select id="sDoctor" class="form-select">
            <option value="">اختر (اختياري)</option>
          </select>
        </div>
        <div class="form-group">
          <label for="sPin">الـ PIN <span class="text-danger">*</span></label>
          <input id="sPin" class="form-input" type="password" placeholder="4 أرقام على الأقل" autocomplete="new-password" />
        </div>
        <div class="form-group">
          <label for="sPinConf">تأكيد الـ PIN <span class="text-danger">*</span></label>
          <input id="sPinConf" class="form-input" type="password" placeholder="أعد كتابة الـ PIN" autocomplete="new-password" />
        </div>
        <button id="signupBtn" type="submit" class="btn btn-success btn-full btn-lg">إنشاء الحساب</button>
      </form>

      <div class="auth-link">
        عندك حساب؟ <a href="/login.html">دخول</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/supabase.js"></script>
  <script src="/assets/js/utils.js"></script>
    <script src="/assets/js/education-config.js"></script>
  <script src="/assets/js/auth.js"></script>
<a href="https://t.me/Mahmoud_M_Hassan101BOT" class="support-float" data-support-link aria-label="support">💬</a>
<script src="/assets/js/control-gate.js"></script>
</body>
</html>
