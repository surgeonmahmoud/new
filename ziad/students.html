<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>طلاب المنصة - دكتور زياد</title>
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/admin.css">
</head>
<body>
  <div id="ziad-login-overlay" class="modal-overlay" style="display:none">
    <div class="modal-box" style="max-width:420px">
      <div class="modal-header"><h3>لوحة كنترول دكتور زياد - المدير</h3></div>
      <div class="modal-body">
        <p class="text-muted mb-2">أدخل كود الدخول للمتابعة</p>
        <div class="form-group"><input id="ziad-code" type="password" placeholder="كود الدخول" autocomplete="off"></div>
        <div id="ziad-login-error" class="text-red text-sm mb-1"></div>
        <button id="ziad-login-btn" class="btn btn-primary btn-block">دخول</button>
      </div>
    </div>
  </div>

  <div id="ziad-app" class="admin-shell" style="display:none">
    <nav class="admin-sidebar">
      <div class="sidebar-header">
      <img src="/assets/img/league-logo.png" alt="logo" class="admin-logo-img" /><div class="brand">دوري المذاكراوية <span>طلاب المنصة - دكتور زياد</span></div></div>
      <div class="sidebar-nav" id="ziad-nav"></div>
    </nav>
    <main class="admin-main">
      <div class="admin-topbar"><h1>طلاب المنصة - دكتور زياد</h1></div>
      <div class="admin-content">
        <div class="filter-bar">
          <div class="form-group"><label class="form-label">الصف</label><select id="filter-grade"><option value="">كل الصفوف</option></select></div>
          <div class="form-group"><label class="form-label">النظام</label><select id="filter-system"><option value="">كل الأنظمة</option></select></div>
          <div class="form-group"><label class="form-label">المسار</label><select id="filter-track"><option value="">كل المسارات</option></select></div>
          <div class="form-group"><label class="form-label">الدكتورة</label><select id="filter-doctor"><option value="">كل المجموعات</option></select></div>
          <div class="form-group"><label class="form-label">الحالة</label><select id="filter-status"><option value="">كل الحالات</option><option value="active">نشط</option><option value="frozen">مجمد</option><option value="inactive">غير نشط</option></select></div>
          <div class="form-group"><label class="form-label">بحث</label><input id="filter-search" placeholder="اسم أو رقم"></div>
        </div>
        <div class="table-wrap"><table><thead><tr><th>الاسم</th><th>الهاتف</th><th>الصف</th><th>النظام</th><th>المسار</th><th>الدكتورة</th><th>النقاط</th><th>XP</th><th>الساعات</th><th>الحالة</th></tr></thead><tbody id="students-table-body"></tbody></table></div>
      </div>
    </main>
  </div>

  <div id="toast-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/supabase.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script src="/assets/js/ziad-panel.js"></script>
  <script>document.addEventListener('DOMContentLoaded', initZiadStudents);</script>
</body>
</html>
