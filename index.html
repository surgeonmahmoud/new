<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>دوري المذاكراوية</title>
  <link rel="stylesheet" href="/assets/css/main.css" />
</head>
<body>
  <div class="landing-wrap landing-v2">
    <button class="landing-control-link" type="button" data-open-control>كنترول</button>

    <main class="landing-box landing-card-v2">
      <img src="/assets/img/league-logo.png" alt="شعار دوري المذاكراوية" class="site-logo landing-logo-img" />
      <div class="landing-logo">دوري المذاكراوية</div>
      <p class="landing-tagline">العبها صح… <strong>ذاكر واكسب الدوري</strong></p>

      <div class="landing-btns">
        <a href="/login.html" class="btn btn-gold btn-lg">دخول لاعب</a>
        <a href="/signup.html" class="btn btn-primary btn-lg">إنشاء لاعب</a>
      </div>
    </main>
  </div>

  <div id="controlGateModal" class="control-gate-modal" aria-hidden="true">
    <div class="control-gate-box" role="dialog" aria-modal="true" aria-labelledby="controlGateTitle">
      <button type="button" class="control-gate-close" data-close-control aria-label="إغلاق">×</button>
      <img src="/assets/img/league-logo.png" alt="شعار دوري المذاكراوية" class="auth-logo-img control-gate-logo" />
      <h2 id="controlGateTitle">دخول الكنترول</h2>
      <p class="control-gate-hint">أدخل رمز الدخول للمتابعة</p>
      <input id="controlGateCode" class="control-gate-input" type="password" inputmode="numeric" autocomplete="off" placeholder="أدخل رمز الدخول" />
      <button id="controlGateSubmit" type="button" class="btn btn-primary btn-full">دخول</button>
      <p id="controlGateError" class="control-gate-error"></p>
    </div>
  </div>

  <a href="https://t.me/Mahmoud_M_Hassan101BOT" class="support-float" data-support-link aria-label="دعم الموقع">💬</a>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/supabase.js"></script>
  <script src="/assets/js/control-gate.js"></script>
</body>
</html>
